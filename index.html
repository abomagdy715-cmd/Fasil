<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0D0D0D"/>
<link rel="manifest" id="mf"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<title>فاصل</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0D0D;--bg2:#141414;--bg3:#1E1E1E;--sur:#242424;--sur2:#2C2C2C;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --tx:#F0EDE8;--tx2:#888580;--tx3:#555250;
  --gold:#D4A843;--gold2:#E8C876;--gold3:rgba(212,168,67,.12);--gold4:rgba(212,168,67,.06);
  --red:#E05252;--redbg:rgba(224,82,82,.1);--redtx:#F09090;
  --green:#52C07A;--greenbg:rgba(82,192,122,.1);--greentx:#90D8AA;
  --amberbg:rgba(212,168,67,.1);--ambertx:#D4A843;--amberbd:rgba(212,168,67,.25);
  --r:16px;--rs:10px;--rss:7px
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.on{display:flex;flex-direction:column}

/* ── AUTH SCREEN ── */
#auth-screen{align-items:center;justify-content:center;padding:2rem}
.auth-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:14px;box-shadow:0 0 50px rgba(212,168,67,.35)}
.auth-title{font-size:34px;font-weight:800;margin-bottom:4px}
.auth-title span{color:var(--gold)}
.auth-sub{font-size:13px;color:var(--tx2);margin-bottom:28px}
.auth-box{width:100%;max-width:320px;background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);padding:1.4rem;position:relative;overflow:hidden}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.4),transparent)}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--rss);padding:3px;margin-bottom:1.2rem;gap:3px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--tx2);border:none;background:none;font-family:'Tajawal',sans-serif;transition:all .2s}
.auth-tab.on{background:var(--gold);color:#0D0D0D}
.auth-form{display:flex;flex-direction:column;gap:10px}
.auth-inp-wrap{display:flex;flex-direction:column;gap:4px}
.auth-inp-wrap label{font-size:11px;color:var(--tx2);font-weight:600}
.auth-inp{height:44px;border:1px solid var(--bd2);border-radius:var(--rs);padding:0 13px;font-size:14px;background:var(--bg3);color:var(--tx);width:100%;font-family:'Tajawal',sans-serif}
.auth-inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
.auth-inp::placeholder{color:var(--tx3)}
.auth-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0D0D0D;width:100%;height:46px;font-size:15px;font-weight:700;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:4px;box-shadow:0 4px 20px rgba(212,168,67,.25)}
.auth-err{color:var(--redtx);font-size:12px;text-align:center;display:none;padding:6px;background:var(--redbg);border-radius:var(--rss)}

/* ── DASHBOARD ── */
#dash-screen{padding-bottom:0}
.dash-header{background:rgba(13,13,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:.85rem 1.2rem;padding-top:calc(.85rem + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
.dash-logo-wrap{display:flex;align-items:center;gap:10px}
.dash-logo{width:32px;height:32px;border-radius:50%;object-fit:cover}
.dash-title{font-size:17px;font-weight:700}
.dash-sub{font-size:11px;color:var(--tx2)}
.logout-btn{background:none;border:1px solid var(--bd2);border-radius:var(--rss);padding:6px 12px;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif}
.dash-body{flex:1;padding:1rem;overflow-y:auto}
.group-card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);padding:1rem 1.1rem;margin-bottom:.75rem;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.group-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.3),transparent)}
.group-card:active{border-color:var(--gold)}
.group-name{font-size:16px;font-weight:700;margin-bottom:4px}
.group-meta{font-size:12px;color:var(--tx2)}
.group-badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;margin-right:6px}
.badge-admin{background:var(--gold3);color:var(--gold)}
.badge-member{background:var(--greenbg);color:var(--greentx)}
.new-group-btn{width:100%;height:50px;border-radius:var(--r);border:1px dashed rgba(212,168,67,.4);background:var(--gold4);color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:.75rem}
.join-group-btn{width:100%;height:50px;border-radius:var(--r);border:1px dashed var(--bd2);background:transparent;color:var(--tx2);font-size:14px;cursor:pointer;font-family:'Tajawal',sans-serif}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--sur);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:1.4rem;position:relative}
.modal::before{content:'';display:block;width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 1.2rem}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1rem}
.modal-form{display:flex;flex-direction:column;gap:10px}
.modal-inp-wrap{display:flex;flex-direction:column;gap:4px}
.modal-inp-wrap label{font-size:11px;color:var(--tx2);font-weight:600}
.modal-inp{height:44px;border:1px solid var(--bd2);border-radius:var(--rs);padding:0 13px;font-size:14px;background:var(--bg3);color:var(--tx);width:100%;font-family:'Tajawal',sans-serif}
.modal-inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
.modal-inp::placeholder{color:var(--tx3)}
.modal-hint{font-size:11px;color:var(--tx3);line-height:1.5}
.modal-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0D0D0D;width:100%;height:46px;font-size:15px;font-weight:700;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:4px}
.modal-btn-cancel{background:none;border:1px solid var(--bd2);color:var(--tx2);width:100%;height:40px;font-size:14px;border-radius:var(--rs);cursor:pointer;font-family:'Tajawal',sans-serif}
.modal-err{color:var(--redtx);font-size:12px;text-align:center;display:none;padding:6px;background:var(--redbg);border-radius:var(--rss)}

/* ── GROUP APP ── */
#group-screen{padding-bottom:88px}
.group-header{background:rgba(13,13,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:.85rem 1.2rem .7rem;padding-top:calc(.85rem + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.back-btn{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.group-hdr-info{flex:1}
.group-hdr-name{font-size:16px;font-weight:700}
.group-hdr-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.role-badge{display:inline-block;padding:2px 8px;border-radius:7px;font-size:10px;font-weight:700;vertical-align:middle}
.role-admin{background:var(--gold3);color:var(--gold)}
.role-member{background:var(--greenbg);color:var(--greentx)}

.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tb{flex:1;border:none;background:none;padding:10px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--tx3);cursor:pointer;font-family:'Tajawal',sans-serif}
.tb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6}
.tb.on{color:var(--gold)}.tb.on svg{stroke:var(--gold)}
.tb-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0}
.tb.on .tb-dot{opacity:1}

.pg{display:none;padding:1rem;animation:fu .2s ease}.pg.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.55rem;margin-top:1.1rem}
.lbl:first-child{margin-top:0}
.card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);padding:.95rem 1.1rem;margin-bottom:.75rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.3),transparent)}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.75rem}
.chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:18px;background:var(--gold3);color:var(--gold2);border:1px solid rgba(212,168,67,.25);font-size:13px;font-weight:500}
.chip-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0D0D0D;flex-shrink:0}
.chip-del{background:none;border:none;color:var(--gold);font-size:16px;cursor:pointer;line-height:1;padding:0 0 0 2px;opacity:.7}

.irow{display:flex;gap:8px}
input,select{height:42px;border:1px solid var(--bd2);border-radius:var(--rs);padding:0 12px;font-size:14px;background:var(--bg3);color:var(--tx);width:100%;font-family:'Tajawal',sans-serif}
input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
input::placeholder{color:var(--tx3)}
select option{background:var(--bg3)}

.btn{height:42px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--sur2);color:var(--tx);font-size:14px;cursor:pointer;padding:0 14px;font-family:'Tajawal',sans-serif}
.btn-sm{height:34px;border-radius:var(--rss);border:1px solid var(--bd2);background:var(--sur2);color:var(--tx2);font-size:12px;cursor:pointer;padding:0 10px;font-family:'Tajawal',sans-serif;width:100%;margin-top:2px}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0D0D0D;width:100%;height:46px;font-size:15px;font-weight:700;border-radius:var(--rs);border:none;cursor:pointer;margin-top:.5rem;font-family:'Tajawal',sans-serif;box-shadow:0 4px 20px rgba(212,168,67,.25)}
.btn-g{background:linear-gradient(135deg,var(--green),#6DD896);color:#0D0D0D;width:100%;height:46px;font-size:15px;font-weight:700;border-radius:var(--rs);border:none;cursor:pointer;margin-top:.5rem;font-family:'Tajawal',sans-serif}

.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fg-full{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:11px;color:var(--tx2);font-weight:600}

.sc{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.sc div{padding:5px 11px;border-radius:13px;border:1px solid var(--bd2);font-size:12px;cursor:pointer;background:var(--bg3);color:var(--tx2)}
.sc div.on{background:var(--greenbg);border-color:var(--green);color:var(--greentx)}

.dr{background:var(--amberbg);border-radius:var(--rs);padding:9px 11px;border:1px solid var(--amberbd);margin-bottom:6px}
.dr-top{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.dr select{flex:1;height:32px;font-size:12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rss);padding:0 7px}
.dr input{width:80px;flex-shrink:0;height:32px;font-size:12px;border-radius:var(--rss)}
.dr-lbl{font-size:11px;color:var(--ambertx);font-weight:700;white-space:nowrap}
.dr-sub{font-size:10px;color:var(--ambertx);opacity:.7;margin-bottom:4px}
.dr-chips{display:flex;flex-wrap:wrap;gap:4px}
.dr-chip{padding:3px 9px;border-radius:11px;border:1px solid var(--amberbd);font-size:11px;cursor:pointer;background:var(--bg3);color:var(--ambertx)}
.dr-chip.on{background:var(--gold);color:#0D0D0D;border-color:var(--gold);font-weight:700}
.rm{background:none;border:none;color:var(--redtx);font-size:19px;cursor:pointer;padding:0 2px;line-height:1;opacity:.7;flex-shrink:0}

.prev{font-size:12px;color:var(--gold2);background:var(--gold4);border-radius:var(--rss);padding:7px 11px;margin-top:5px;display:none;line-height:1.8;border:1px solid rgba(212,168,67,.15)}

.ei{display:flex;align-items:flex-start;padding:12px 13px;background:var(--sur);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:7px;gap:7px}
.en{font-size:14px;font-weight:600}
.em{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.7}
.etag{display:inline-block;background:var(--amberbg);color:var(--ambertx);border-radius:8px;padding:1px 6px;font-size:10px;margin:1px 2px}
.ea{font-size:15px;font-weight:700;color:var(--gold);white-space:nowrap}
.delbtn{background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;padding:3px}

.total-strip{display:flex;align-items:center;justify-content:space-between;background:var(--gold4);border-radius:var(--rs);border:1px solid rgba(212,168,67,.2);padding:10px 14px;margin-bottom:.75rem}
.total-strip span{font-size:12px;color:var(--ambertx);font-weight:600}
.total-strip strong{font-size:16px;color:var(--gold);font-weight:700}

.bc{background:var(--sur);border-radius:var(--rs);border:1px solid var(--bd);padding:12px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
.bc-gp{position:absolute;top:0;bottom:0;right:0;width:3px;background:linear-gradient(180deg,var(--green),transparent)}
.bc-gn{position:absolute;top:0;bottom:0;right:0;width:3px;background:linear-gradient(180deg,var(--red),transparent)}
.bn{font-size:14px;font-weight:600}
.bl2{font-size:11px;color:var(--tx2);margin-top:2px}
.ba{font-size:17px;font-weight:700}
.pos{color:var(--greentx)}.neg{color:var(--redtx)}.zer{color:var(--tx3)}

.si{display:flex;align-items:center;gap:7px;background:var(--sur);border-radius:var(--rs);border:1px solid var(--bd);padding:12px 13px;margin-bottom:7px}
.sf{font-weight:700;color:var(--redtx);font-size:13px;background:var(--redbg);padding:4px 9px;border-radius:9px}
.sarr{color:var(--tx3);font-size:18px;flex-shrink:0}
.st{font-weight:700;color:var(--greentx);font-size:13px;background:var(--greenbg);padding:4px 9px;border-radius:9px}
.sv{margin-right:auto;font-weight:700;font-size:15px;color:var(--gold)}

.pay-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.pay-row select{flex:1;height:38px;font-size:13px}
.pay-row input{width:90px;flex-shrink:0;height:38px}
.plog-title{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;margin-top:.8rem}
.plog-item{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 11px;background:var(--greenbg);border:1px solid rgba(82,192,122,.2);border-radius:var(--rss);margin-bottom:5px;font-size:12px}
.pi-from{font-weight:700;color:var(--redtx)}
.pi-word{color:var(--tx3)}
.pi-to{font-weight:700;color:var(--greentx)}
.pi-amt{font-weight:700;color:var(--tx);margin-right:auto}
.pi-date{color:var(--tx3);font-size:10px}
.pi-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:15px;padding:0 2px}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx3);font-size:14px}
.empty-icon{font-size:34px;margin-bottom:8px;opacity:.5}
.info{background:var(--gold4);border-radius:var(--rs);padding:11px 13px;font-size:12px;color:var(--ambertx);margin-top:.75rem;border:1px solid rgba(212,168,67,.15);line-height:1.6}
.divider{height:1px;background:var(--bd);margin:1rem 0}
.loading{text-align:center;padding:3rem;color:var(--tx3);font-size:14px}
.gc-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.gc-summary{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:5px}
.gc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.gc-lbl{color:var(--tx2)}
.gc-val{font-weight:600;color:var(--tx);font-size:12px;text-align:left;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-debt{color:var(--redtx)}
.gc-settled{font-size:12px;color:var(--greentx);font-weight:600}
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBB_88fjcUn0booIIWwLkBx-haQwKWcIVg",
  authDomain: "fasil-c783b.firebaseapp.com",
  projectId: "fasil-c783b",
  storageBucket: "fasil-c783b.firebasestorage.app",
  messagingSenderId: "483101694257",
  appId: "1:483101694257:web:0d77080644f81540c33810"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ═══ STATE ═══
let currentUser = null;
let currentGroup = null;
let isAdmin = false;
let people = [], expenses = [], payments = [];
let unsubPeople, unsubExpenses, unsubPayments;

// ═══ SCREENS ═══
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

// ═══ AUTH ═══
function showErr(el, msg) { el.textContent = msg; el.style.display = "block"; }

// تبويبات أدمن / عضو
document.getElementById("tab-admin").onclick = () => {
  document.getElementById("tab-admin").classList.add("on");
  document.getElementById("tab-member").classList.remove("on");
  document.getElementById("admin-form").style.display = "";
  document.getElementById("register-form").style.display = "none";
  document.getElementById("member-form").style.display = "none";
};
document.getElementById("tab-member").onclick = () => {
  document.getElementById("tab-member").classList.add("on");
  document.getElementById("tab-admin").classList.remove("on");
  document.getElementById("admin-form").style.display = "none";
  document.getElementById("register-form").style.display = "none";
  document.getElementById("member-form").style.display = "";
};

// إظهار فورم التسجيل
document.getElementById("show-register-btn").onclick = () => {
  document.getElementById("admin-form").style.display = "none";
  document.getElementById("register-form").style.display = "";
};
document.getElementById("back-to-login-btn").onclick = () => {
  document.getElementById("register-form").style.display = "none";
  document.getElementById("admin-form").style.display = "";
};

// دخول الأدمن
document.getElementById("auth-btn").onclick = async () => {
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value.trim();
  const errEl = document.getElementById("auth-err");
  errEl.style.display = "none";
  if (!email || !pass) { showErr(errEl, "اكتب الإيميل وكلمة السر"); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      "auth/user-not-found": "مفيش حساب بالإيميل ده",
      "auth/wrong-password": "كلمة السر غلط",
      "auth/invalid-credential": "إيميل أو كلمة سر غلط",
      "auth/invalid-email": "إيميل غلط"
    };
    showErr(errEl, msgs[e.code] || "حصل خطأ، حاول تاني");
  }
};

// نسيت كلمة السر
document.getElementById("forgot-pass-btn").onclick = async () => {
  const email = document.getElementById("auth-email").value.trim();
  const errEl = document.getElementById("auth-err");
  errEl.style.display = "none";
  if (!email) {
    showErr(errEl, "اكتب الإيميل الأول عشان نبعتلك رابط إعادة التعيين");
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    errEl.style.background = "var(--greenbg)";
    errEl.style.color = "var(--greentx)";
    showErr(errEl, "✓ اتبعت رابط إعادة التعيين على إيميلك");
    setTimeout(() => {
      errEl.style.display = "none";
      errEl.style.background = "";
      errEl.style.color = "";
    }, 4000);
  } catch(e) {
    showErr(errEl, "تأكد من الإيميل وحاول تاني");
  }
};

// تسجيل أدمن جديد
document.getElementById("reg-btn").onclick = async () => {
  const email = document.getElementById("reg-email").value.trim();
  const pass = document.getElementById("reg-pass").value.trim();
  const errEl = document.getElementById("reg-err");
  errEl.style.display = "none";
  if (!email || !pass) { showErr(errEl, "اكتب الإيميل وكلمة السر"); return; }
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      "auth/email-already-in-use": "الإيميل ده موجود بالفعل",
      "auth/invalid-email": "إيميل غلط",

let groupsUnsub = null;

function loadGroups() {
  const el = document.getElementById("groups-list");
  if (groupsUnsub) groupsUnsub();
  // Load groups where user is admin
  const myGroupsQ = query(collection(db, "groups"), where("adminUid", "==", currentUser.uid));
  // Load groups where user is member
  const memberGroupsQ = query(collection(db, "groups"), where("members", "array-contains", currentUser.uid));

  let myGroups = [], memberGroups = [];

  const render = () => {
    const all = [...myGroups];
    memberGroups.forEach(g => { if (!all.find(x => x.id === g.id)) all.push(g); });
    if (!all.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>مفيش مجموعات بعد<br>أنشئ مجموعة أو انضم لواحدة</div>';
      return;
    }
    const renderWithCounts = async () => {
      const cards = await Promise.all(all.map(async g => {
        const isMine = g.adminUid === currentUser.uid;
        const badge = isMine
          ? '<span class="group-badge badge-admin">👑 أدمن</span>'
          : '<span class="group-badge badge-member">👤 عضو</span>';

        const [pSnap, eSnap, paySnap] = await Promise.all([
          getDocs(collection(db, "groups/" + g.id + "/people")),
          getDocs(collection(db, "groups/" + g.id + "/expenses")),
          getDocs(collection(db, "groups/" + g.id + "/payments"))
        ]);

        const people = pSnap.docs.map(d => d.data().name);
        const expenses = eSnap.docs.map(d => d.data());
        const payments = paySnap.docs.map(d => d.data());

        // إجمالي المصاريف
        const total = expenses.reduce((s,e) => s + (e.amount||0), 0);

        // آخر مصروف
        const lastExp = expenses.sort((a,b) => (b.ts||0)-(a.ts||0))[0];

        // حساب الأرصدة
        const bal = {};
        people.forEach(p => bal[p] = 0);
        expenses.forEach(e => {
          const deds = e.deductions || [];
          const totalDed = deds.reduce((s,d) => s + d.amount, 0);
          const shared = (e.amount||0) - totalDed;
          if (e.payer) bal[e.payer] = (bal[e.payer]||0) + (e.amount||0);
          (e.split||[]).forEach(p => { bal[p] = (bal[p]||0) - shared / (e.split.length||1); });
          deds.forEach(d => {
            if (d.onPeople && d.onPeople.length) {
              const sh = d.amount / d.onPeople.length;
              d.onPeople.forEach(p => { bal[p] = (bal[p]||0) - sh; });
            }
          });
        });
        payments.forEach(p => {
          if(p.from) bal[p.from] = (bal[p.from]||0) + (p.amount||0);
          if(p.to)   bal[p.to]   = (bal[p.to]||0)   - (p.amount||0);
        });

        // مين عليه فلوس
        const debtors = Object.entries(bal).filter(([,b]) => b < -0.01).map(([n,b]) => n + ': ' + Math.abs(b).toFixed(0) + ' ر').join(' · ');
        const allSettled = Object.values(bal).every(b => Math.abs(b) < 0.01);

        let summaryHtml = '';
        if (total > 0) {
          summaryHtml += '<div class="gc-summary">';
          summaryHtml += '<div class="gc-row"><span class="gc-lbl">💰 الإجمالي</span><span class="gc-val">' + total.toFixed(2) + ' ر</span></div>';
          if (lastExp) summaryHtml += '<div class="gc-row"><span class="gc-lbl">📋 آخر مصروف</span><span class="gc-val">' + lastExp.name + '</span></div>';
          if (allSettled && people.length > 0) {
            summaryHtml += '<div class="gc-settled">✅ الحسابات متساوية</div>';
          } else if (debtors) {
            summaryHtml += '<div class="gc-row"><span class="gc-lbl">🔴 عليهم</span><span class="gc-val gc-debt">' + debtors + '</span></div>';
          }
          summaryHtml += '</div>';
        }

        return '<div class="group-card" data-id="' + g.id + '">' +
          '<div class="gc-top">' + badge + '<div class="group-name">' + g.name + '</div></div>' +
          '<div class="group-meta">' + pSnap.size + ' أشخاص · ' + eSnap.size + ' مصروف</div>' +
          summaryHtml +
          '</div>';
      }));

      el.innerHTML = cards.join("");
      el.querySelectorAll(".group-card").forEach(card => {
        card.onclick = () => {
          const g = all.find(x => x.id === card.dataset.id);
          openGroup(g);
        };
      });
    };
    renderWithCounts();

  };

  onSnapshot(myGroupsQ, snap => {
    myGroups = snap.docs.map(d => ({...d.data(), id: d.id}));
    render();
  });
  onSnapshot(memberGroupsQ, snap => {
    memberGroups = snap.docs.map(d => ({...d.data(), id: d.id}));
    render();
  });
}

  if (!people.length) { alert("أضف أشخاصاً أولاً"); return; }

  const row = document.createElement("div"); row.className = "dr";

    let lines = [];
    if (totalDed > 0) lines.push("✂️ إجمالي الخصومات: <strong>" + totalDed.toFixed(2) + " ر</strong>");
    lines.push("🤝 المبلغ المشترك: <strong>" + shared.toFixed(2) + " ر</strong>");

// ═══ BALANCES ═══
function calcBalances() {
  const bal = {};
  people.forEach(p => bal[p] = 0);
  expenses.forEach(e => {
    const deds = e.deductions || [];
    const totalDed = deds.reduce((s,d) => s + d.amount, 0);
    const shared = e.amount - totalDed;
    bal[e.payer] = (bal[e.payer]||0) + e.amount;
    e.split.forEach(p => { bal[p] = (bal[p]||0) - shared / e.split.length; });
    deds.forEach(d => {
      if (d.onPeople && d.onPeople.length) {
        const sh = d.amount / d.onPeople.length;
        d.onPeople.forEach(p => { bal[p] = (bal[p]||0) - sh; });
      }
    });
  });
  payments.forEach(p => {
    bal[p.from] = (bal[p.from]||0) + p.amount;
    bal[p.to]   = (bal[p.to]||0)   - p.amount;
  });
  return bal;
}

function calcSettlements(bal) {
  const cr = [], db2 = [];
  Object.entries(bal).forEach(([n,b]) => {
    if (b > 0.01) cr.push({name:n,amount:b});
    else if (b < -0.01) db2.push({name:n,amount:-b});
  });
  cr.sort((a,b) => b.amount-a.amount); db2.sort((a,b) => b.amount-a.amount);
  const txns = []; let ci = 0, di = 0;
  while (ci < cr.length && di < db2.length) {
    const c = cr[ci], d = db2[di], amt = Math.min(c.amount, d.amount);
    txns.push({from:d.name, to:c.name, amount:amt});
    c.amount -= amt; d.amount -= amt;
    if (c.amount < 0.01) ci++; if (d.amount < 0.01) di++;
  }
  return txns;
}

function renderResult() {
  const bal = calcBalances();
  const bg = document.getElementById("balances");
  if (!people.length) { bg.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>أضف أشخاصاً أولاً</div>'; return; }
  bg.innerHTML = people.map(p => {
    const b = bal[p] || 0;
    const cls = b > 0.01 ? "pos" : b < -0.01 ? "neg" : "zer";
    const lbl = b > 0.01 ? "له فلوس 💚" : b < -0.01 ? "عليه فلوس 🔴" : "متساوي ✓";
    const glow = b > 0.01 ? '<div class="bc-gp"></div>' : b < -0.01 ? '<div class="bc-gn"></div>' : '';
    return '<div class="bc">' + glow + '<div><div class="bn">' + p + '</div><div class="bl2">' + lbl + '</div></div>' +
      '<div class="ba ' + cls + '">' + (b > 0 ? "+" : "") + b.toFixed(2) + ' ر</div></div>';
  }).join("");

  const txns = calcSettlements(calcBalances());
  const sl = document.getElementById("settlements");
  sl.innerHTML = !txns.length
    ? (!expenses.length ? '<div class="empty"><div class="empty-icon">📊</div>أضف مصاريف أولاً</div>' : '<div class="empty"><div class="empty-icon">✅</div>الحسابات متساوية!</div>')
    : txns.map(t => '<div class="si"><span class="sf">' + t.from + '</span><span class="sarr">←</span><span class="st">' + t.to + '</span><span class="sv">' + t.amount.toFixed(2) + ' ر</span></div>').join("");

  if (isAdmin) {
    const pf = document.getElementById("pay-from"), pt = document.getElementById("pay-to");
    const cf = pf.value, ct = pt.value;
    pf.innerHTML = people.map(p => '<option value="' + p + '">' + p + '</option>').join("");
    pt.innerHTML = people.map(p => '<option value="' + p + '">' + p + '</option>').join("");
    if (people.includes(cf)) pf.value = cf;
    if (people.includes(ct)) pt.value = ct;
    if (!document.getElementById("pay-date").value)
      document.getElementById("pay-date").value = new Date().toISOString().split("T")[0];
  }
  renderPayLog();
}

document.getElementById("add-pay-btn").onclick = async () => {
  const from = document.getElementById("pay-from").value;
  const to = document.getElementById("pay-to").value;
  const amount = parseFloat(document.getElementById("pay-amount").value);
  const date = document.getElementById("pay-date").value;
  if (!from || !to || !amount || amount <= 0) { alert("اكمل بيانات الدفعة"); return; }
  if (from === to) { alert("الدافع والمستلم نفس الشخص!"); return; }
  const id = Date.now().toString();
  await setDoc(doc(db, "groups/" + currentGroup.id + "/payments", id),
    { id, from, to, amount, date, ts: Date.now() });
  document.getElementById("pay-amount").value = "";
  renderResult();
};

function renderPayLog() {
  const el = document.getElementById("pay-log");
  if (!payments.length) { el.innerHTML = ""; return; }
  el.innerHTML = '<div class="plog-title">سجل الدفعات</div>' +
    payments.map(p => {
      const del = isAdmin ? '<button class="pi-del" data-id="' + p.id + '">🗑</button>' : '';
      return '<div class="plog-item"><span class="pi-from">' + p.from + '</span>' +
        '<span class="pi-word">دفع لـ</span><span class="pi-to">' + p.to + '</span>' +
        '<span class="pi-amt">' + p.amount.toFixed(2) + ' ر</span>' +
        '<span class="pi-date">' + (p.date||"") + '</span>' + del + '</div>';
    }).join("");
  if (isAdmin) el.querySelectorAll(".pi-del").forEach(btn => {
    btn.onclick = async () => {
      if (!confirm("حذف هذه الدفعة؟")) return;
      await deleteDoc(doc(db, "groups/" + currentGroup.id + "/payments", btn.dataset.id));
      renderResult();
    };
  });
}
